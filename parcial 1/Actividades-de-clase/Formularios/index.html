<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario dinamicos</title>
    <link rel="stylesheet" href="css/estilo.css">
</head>
<body>

<form action="">
    <label>Nombre:</label>
    <input type="text" 
           name="nombre"
           placeholder="Ingresa el nombre" 
           id="input-txt-nombre">
    <br>

    <label>Apellido:</label>
    <input type="text"
           id="apellido-guardar"
           name="apellido"
           placeholder="Ingresa el apellido"> <br>

           <label for="cantidad_correos">Ingrese la cantidad de correos que va ingresar:</label>
           <input type="number" name="cantidad_correos" id="cantidad_correos" onchange="cambiarNumero(event)">
           <br>
           <div class="contenedor_correos" id="contenedor_correos"></div>
           
           <button id="boton-guardar">Guardar</button>
</form>



<script src="js/scrip.js"></script>
</body>
</html>
